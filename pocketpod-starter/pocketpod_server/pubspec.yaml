name: pocketpod_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '^3.10.3'

resolution: workspace

dependencies:
  serverpod: 3.5.0-beta.10
  serverpod_auth_idp_server: 3.5.0-beta.10

dev_dependencies:
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.5.0-beta.10
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the SQLite-backed server and applies migrations.
    start: dart run bin/main.dart --apply-migrations

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\pocketpod_flutter
        && flutter build web --base-href /app/ --wasm
        && xcopy /E /I /Y build\web ..\pocketpod_server\web\app
      posix: |
        cd ../pocketpod_flutter
        flutter build web --base-href /app/ --wasm --output ../pocketpod_server/web/app
