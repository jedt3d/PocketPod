# Copy this file to config/passwords.yaml for local development.
# Do not commit config/passwords.yaml; it contains deployment secrets.

shared:
  mySharedPassword: 'replace-me'

development:
  database: 'replace-me-development-database'
  redis: 'replace-me-development-redis'
  serviceSecret: 'replace-me-development-service-secret'
  emailSecretHashPepper: 'replace-me-development-email-pepper'
  jwtHmacSha512PrivateKey: 'replace-me-development-jwt-private-key'
  jwtRefreshTokenHashPepper: 'replace-me-development-refresh-pepper'

test:
  database: 'replace-me-test-database'
  redis: 'replace-me-test-redis'
  emailSecretHashPepper: 'replace-me-test-email-pepper'
  jwtHmacSha512PrivateKey: 'replace-me-test-jwt-private-key'
  jwtRefreshTokenHashPepper: 'replace-me-test-refresh-pepper'

staging:
  database: 'replace-me-staging-database'
  serviceSecret: 'replace-me-staging-service-secret'
  emailSecretHashPepper: 'replace-me-staging-email-pepper'
  jwtHmacSha512PrivateKey: 'replace-me-staging-jwt-private-key'
  jwtRefreshTokenHashPepper: 'replace-me-staging-refresh-pepper'

production:
  database: 'replace-me-production-database'
