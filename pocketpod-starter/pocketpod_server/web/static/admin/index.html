<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PocketPod Admin</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #1f2933;
        --muted: #6b7280;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --danger: #b42318;
        --sidebar: #eef2f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 248px minmax(0, 1fr);
      }

      aside {
        border-right: 1px solid var(--line);
        background: var(--sidebar);
        padding: 22px 16px;
      }

      .brand {
        margin-bottom: 24px;
      }

      .brand strong {
        display: block;
        font-size: 20px;
      }

      .brand span,
      .nav-label,
      .muted {
        color: var(--muted);
      }

      .nav-label {
        margin: 22px 0 8px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .nav-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        min-height: 36px;
        margin: 3px 0;
        border: 0;
        border-radius: 6px;
        padding: 0 10px;
        background: transparent;
        color: #374151;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      .nav-item.active {
        background: #d7f4ef;
        color: #064e47;
        font-weight: 700;
      }

      main {
        padding: 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 1px 2px rgb(15 23 42 / 6%);
        overflow: hidden;
      }

      .login-panel {
        max-width: 420px;
        margin: 8vh auto;
        padding: 24px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
      }

      input,
      select {
        height: 40px;
      }

      textarea {
        min-height: 116px;
        padding: 10px;
        resize: vertical;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
      }

      button.link-button {
        height: 30px;
        border: 1px solid var(--line);
        background: white;
        color: var(--accent);
      }

      button.record-link {
        height: auto;
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: var(--accent);
        font: inherit;
        font-weight: 700;
        text-align: left;
      }

      button.record-link:hover {
        background: transparent;
        color: var(--accent-strong);
        text-decoration: underline;
      }

      button.nav-item:hover {
        background: #e3e8ef;
      }

      button.nav-item.active:hover {
        background: #d7f4ef;
      }

      .error {
        display: none;
        margin-top: 14px;
        color: var(--danger);
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .metric {
        padding: 16px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 14px;
        text-align: left;
      }

      th {
        background: #f8fafc;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .collection-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .collection-header h2 {
        margin: 0;
        font-size: 20px;
      }

      .collection-header p {
        margin: 4px 0 0;
      }

      .field-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0 6px 6px 0;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 9px;
        background: #f8fafc;
        color: #374151;
        font-size: 12px;
        white-space: nowrap;
      }

      .required-dot {
        color: var(--danger);
        font-weight: 800;
      }

      .empty-state {
        padding: 22px;
        color: var(--muted);
      }

      .edit-panel {
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: #fbfcfd;
        padding: 16px;
      }

      .edit-panel h3 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .edit-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 16px;
      }

      .edit-grid .wide {
        grid-column: 1 / -1;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 40px;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .edit-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section id="loginView" class="login-panel panel">
      <div class="brand">
        <strong>PocketPod Admin</strong>
        <span>Serverpod Auth required</span>
      </div>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="manual-check@example.com" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" value="change-me-now" autocomplete="current-password" required>

        <div style="margin-top: 18px;">
          <button type="submit">Sign in</button>
        </div>
        <div id="loginError" class="error"></div>
      </form>
    </section>

    <section id="adminView" class="shell hidden">
      <aside>
        <div class="brand">
          <strong>PocketPod</strong>
          <span id="scopeLine">Admin workspace</span>
        </div>
        <div class="nav-label">Collections</div>
        <div id="collectionNav"></div>
        <div class="nav-label">System</div>
        <button class="nav-item" type="button" disabled>Auth <span>on</span></button>
      </aside>
      <main>
        <div class="topbar">
          <div>
            <h1>PocketPod Admin</h1>
            <div id="statusLine" class="muted">Checking session...</div>
          </div>
          <button id="logoutButton" class="secondary" type="button">Sign out</button>
        </div>

        <div class="grid">
          <div class="panel metric">
            <span class="muted">Auth</span>
            <strong>Serverpod</strong>
          </div>
          <div class="panel metric">
            <span class="muted">Required Scope</span>
            <strong>admin</strong>
          </div>
          <div class="panel metric">
            <span class="muted">Collections</span>
            <strong id="collectionCount">0</strong>
          </div>
        </div>

        <div class="panel" id="collectionPanel">
          <div class="collection-header">
            <div>
              <h2 id="activeCollectionTitle">Collections</h2>
              <p id="activeCollectionDescription" class="muted">
                Choose a collection from the sidebar.
              </p>
            </div>
            <button class="secondary" type="button" disabled>New record</button>
          </div>
          <div id="fieldSummary" style="padding: 14px 16px 8px;"></div>
          <form id="editForm" class="edit-panel hidden">
            <h3 id="editTitle">Edit record</h3>
            <div id="editFields" class="edit-grid"></div>
            <div class="form-actions">
              <button type="submit">Save changes</button>
              <button id="cancelEditButton" class="secondary" type="button">Cancel</button>
            </div>
            <div id="editError" class="error"></div>
          </form>
          <div style="overflow-x: auto;">
            <table>
              <thead id="recordsHead"></thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </section>

    <script>
      const apiBase = `${location.protocol}//${location.hostname}:8080`;
      const loginView = document.getElementById('loginView');
      const adminView = document.getElementById('adminView');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const logoutButton = document.getElementById('logoutButton');
      const statusLine = document.getElementById('statusLine');
      const scopeLine = document.getElementById('scopeLine');
      const collectionCount = document.getElementById('collectionCount');
      const collectionNav = document.getElementById('collectionNav');
      const activeCollectionTitle = document.getElementById('activeCollectionTitle');
      const activeCollectionDescription = document.getElementById('activeCollectionDescription');
      const fieldSummary = document.getElementById('fieldSummary');
      const editForm = document.getElementById('editForm');
      const editTitle = document.getElementById('editTitle');
      const editFields = document.getElementById('editFields');
      const editError = document.getElementById('editError');
      const cancelEditButton = document.getElementById('cancelEditButton');
      const recordsHead = document.getElementById('recordsHead');
      const recordsBody = document.getElementById('recordsBody');

      let authToken = localStorage.getItem('pocketpod.admin.token');
      let collections = [];
      let activeCollectionKey = null;
      let activeCollection = null;
      let activeRows = [];
      let editRecordId = null;

      async function callEndpoint(endpoint, method, body, token) {
        const headers = {'content-type': 'application/json'};
        if (token) {
          headers.authorization = `Bearer ${token}`;
        }

        const response = await fetch(`${apiBase}/${endpoint}/${method}`, {
          method: 'POST',
          headers,
          body: JSON.stringify(body || {}),
        });

        const text = await response.text();
        const payload = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(payload?.message || text || `HTTP ${response.status}`);
        }
        return payload;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      async function loadDashboard() {
        const dashboard = await callEndpoint('admin', 'dashboard', {}, authToken);
        collections = await callEndpoint('admin', 'listCollections', {}, authToken);

        loginView.classList.add('hidden');
        adminView.classList.remove('hidden');
        statusLine.textContent = `${dashboard.message} User: ${dashboard.signedInUserId}`;
        scopeLine.textContent = dashboard.scopeNames.join(', ');
        collectionCount.textContent = collections.length;
        renderCollectionNav();

        const preferredCollection = collections.find(
          (collection) => collection.key === activeCollectionKey,
        ) ?? collections[0];

        if (preferredCollection) {
          await selectCollection(preferredCollection.key);
        }
      }

      function renderCollectionNav() {
        collectionNav.innerHTML = collections.map((collection) => `
          <button
            class="nav-item ${collection.key === activeCollectionKey ? 'active' : ''}"
            type="button"
            data-collection-key="${escapeHtml(collection.key)}"
          >
            ${escapeHtml(collection.title)}
            <span>${collection.rowCount}</span>
          </button>
        `).join('');
      }

      async function selectCollection(collectionKey) {
        activeCollectionKey = collectionKey;
        editRecordId = null;
        editForm.classList.add('hidden');
        renderCollectionNav();

        const response = await callEndpoint('admin', 'listRecords', {
          collectionKey,
        }, authToken);

        const collection = response.collection;
        const rows = response.rows;
        activeCollection = collection;
        activeRows = rows;
        activeCollectionTitle.textContent = collection.title;
        activeCollectionDescription.textContent = collection.description;
        fieldSummary.innerHTML = collection.fields.map((field) => `
          <span class="field-chip">
            ${escapeHtml(field.label)}
            ${field.required ? '<span class="required-dot">*</span>' : ''}
            <span class="muted">${escapeHtml(field.control)}</span>
          </span>
        `).join('');

        recordsHead.innerHTML = `
          <tr>
            <th>ID</th>
            ${collection.fields.map((field) => `<th>${escapeHtml(field.label)}</th>`).join('')}
            <th>Actions</th>
          </tr>
        `;

        if (!rows.length) {
          recordsBody.innerHTML = `
            <tr>
              <td colspan="${collection.fields.length + 2}">
                <div class="empty-state">No records in this collection yet.</div>
              </td>
            </tr>
          `;
          return;
        }

        recordsBody.innerHTML = rows.map((row) => {
          const values = Object.fromEntries(row.cells.map((cell) => [cell.field, cell.value]));
          return `
            <tr>
              <td>${escapeHtml(row.id)}</td>
              ${collection.fields.map((field) => `
                <td>${renderRecordCell(collection, row, field, values[field.name] ?? '')}</td>
              `).join('')}
              <td>
                ${isEditableCollection(collection.key)
                  ? `<button class="link-button" type="button" data-edit-id="${escapeHtml(row.id)}">Edit</button>`
                  : '<span class="muted">Read-only</span>'}
              </td>
            </tr>
          `;
        }).join('');
      }

      function isEditableCollection(collectionKey) {
        return collectionKey === 'products' || collectionKey === 'posts';
      }

      function primaryEditField(collectionKey) {
        if (collectionKey === 'products') {
          return 'name';
        }
        if (collectionKey === 'posts' || collectionKey === 'admin_input_examples') {
          return 'title';
        }
        return null;
      }

      function renderRecordCell(collection, row, field, value) {
        if (
          isEditableCollection(collection.key) &&
          field.name === primaryEditField(collection.key)
        ) {
          return `
            <button class="record-link" type="button" data-edit-id="${escapeHtml(row.id)}">
              ${escapeHtml(value)}
            </button>
          `;
        }
        return escapeHtml(value);
      }

      function toInputDateTime(value) {
        if (!value) {
          return '';
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '';
        }
        return date.toISOString().slice(0, 16);
      }

      function toEndpointDateTime(value) {
        if (!value) {
          return '';
        }
        return new Date(value).toISOString();
      }

      function relationOptions(fieldName) {
        if (fieldName === 'categoryId') {
          return [
            ['1', 'Software'],
            ['2', 'Services'],
            ['3', 'Preview'],
          ];
        }
        if (fieldName === 'authorId') {
          return [['1', 'Admin']];
        }
        return [];
      }

      function renderEditControl(field, value) {
        const id = `edit-${field.name}`;
        const required = field.required ? 'required' : '';
        const readonly = field.name === 'updatedAt';
        const requiredMark = field.required ? '<span class="required-dot">*</span>' : '';
        const label = `<label for="${id}">${escapeHtml(field.label)} ${requiredMark}</label>`;

        if (field.control === 'checkbox') {
          return `
            <div>
              ${label}
              <div class="check-row">
                <input id="${id}" name="${escapeHtml(field.name)}" type="checkbox" ${value === 'true' ? 'checked' : ''}>
                <span class="muted">Enabled when checked</span>
              </div>
            </div>
          `;
        }

        if (field.control === 'textarea') {
          return `
            <div class="wide">
              ${label}
              <textarea id="${id}" name="${escapeHtml(field.name)}" ${required}>${escapeHtml(value)}</textarea>
            </div>
          `;
        }

        if (field.control === 'datetime') {
          return `
            <div>
              ${label}
              <input id="${id}" name="${escapeHtml(field.name)}" type="datetime-local" value="${escapeHtml(toInputDateTime(value))}" ${required} ${readonly ? 'disabled' : ''}>
            </div>
          `;
        }

        if (field.control === 'number') {
          return `
            <div>
              ${label}
              <input id="${id}" name="${escapeHtml(field.name)}" type="number" step="any" value="${escapeHtml(value)}" ${required}>
            </div>
          `;
        }

        if (field.control === 'relation' || field.control === 'select') {
          const options = relationOptions(field.name);
          if (options.length) {
            return `
              <div>
                ${label}
                <select id="${id}" name="${escapeHtml(field.name)}" ${required}>
                  ${options.map(([optionValue, optionLabel]) => `
                    <option value="${escapeHtml(optionValue)}" ${optionValue === value ? 'selected' : ''}>${escapeHtml(optionLabel)}</option>
                  `).join('')}
                </select>
              </div>
            `;
          }
        }

        return `
          <div>
            ${label}
            <input id="${id}" name="${escapeHtml(field.name)}" type="text" value="${escapeHtml(value)}" ${required}>
          </div>
        `;
      }

      async function openEditForm(id) {
        const response = await callEndpoint('admin', 'getRecord', {
          collectionKey: activeCollectionKey,
          id,
        }, authToken);
        const values = Object.fromEntries(response.cells.map((cell) => [cell.field, cell.value]));
        editRecordId = response.id;
        editTitle.textContent = `Edit ${activeCollection.title} #${response.id}`;
        editError.style.display = 'none';
        editFields.innerHTML = activeCollection.fields
          .map((field) => renderEditControl(field, values[field.name] ?? ''))
          .join('');
        editForm.classList.remove('hidden');
      }

      async function saveEditForm() {
        const cells = activeCollection.fields
          .filter((field) => field.name !== 'updatedAt')
          .map((field) => {
            const control = editForm.elements[field.name];
            let value = '';
            if (field.control === 'checkbox') {
              value = control.checked ? 'true' : 'false';
            } else if (field.control === 'datetime') {
              value = toEndpointDateTime(control.value);
            } else {
              value = control.value;
            }
            return {field: field.name, value};
          });

        await callEndpoint('admin', 'updateRecord', {
          collectionKey: activeCollectionKey,
          id: editRecordId,
          cells,
        }, authToken);
        statusLine.textContent = `Saved ${activeCollection.title} #${editRecordId}.`;
        await selectCollection(activeCollectionKey);
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        loginError.style.display = 'none';

        try {
          const auth = await callEndpoint('adminAuth', 'login', {
            email: loginForm.email.value,
            password: loginForm.password.value,
          });
          authToken = auth.token;
          localStorage.setItem('pocketpod.admin.token', authToken);
          await loadDashboard();
        } catch (error) {
          loginError.textContent = `Sign in failed: ${error.message}`;
          loginError.style.display = 'block';
        }
      });

      logoutButton.addEventListener('click', () => {
        localStorage.removeItem('pocketpod.admin.token');
        authToken = null;
        activeCollectionKey = null;
        adminView.classList.add('hidden');
        loginView.classList.remove('hidden');
      });

      collectionNav.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-collection-key]');
        if (!button) {
          return;
        }

        selectCollection(button.dataset.collectionKey).catch((error) => {
          statusLine.textContent = `Collection load failed: ${error.message}`;
        });
      });

      recordsBody.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-edit-id]');
        if (!button) {
          return;
        }

        openEditForm(button.dataset.editId).catch((error) => {
          statusLine.textContent = `Edit load failed: ${error.message}`;
        });
      });

      cancelEditButton.addEventListener('click', () => {
        editRecordId = null;
        editForm.classList.add('hidden');
      });

      editForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        editError.style.display = 'none';
        try {
          await saveEditForm();
        } catch (error) {
          editError.textContent = `Save failed: ${error.message}`;
          editError.style.display = 'block';
        }
      });

      if (authToken) {
        loadDashboard().catch(() => {
          localStorage.removeItem('pocketpod.admin.token');
          authToken = null;
        });
      }
    </script>
  </body>
</html>
