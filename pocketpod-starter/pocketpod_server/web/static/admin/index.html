<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PocketPod Admin</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #1f2933;
        --muted: #6b7280;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --danger: #b42318;
        --sidebar: #eef2f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 248px minmax(0, 1fr);
      }

      aside {
        border-right: 1px solid var(--line);
        background: var(--sidebar);
        padding: 22px 16px;
      }

      .brand {
        margin-bottom: 24px;
      }

      .brand strong {
        display: block;
        font-size: 20px;
      }

      .brand span,
      .nav-label,
      .muted {
        color: var(--muted);
      }

      .nav-label {
        margin: 22px 0 8px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .nav-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 36px;
        margin: 3px 0;
        border-radius: 6px;
        padding: 0 10px;
        color: #374151;
      }

      .nav-item.active {
        background: #d7f4ef;
        color: #064e47;
        font-weight: 700;
      }

      main {
        padding: 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 1px 2px rgb(15 23 42 / 6%);
      }

      .login-panel {
        max-width: 420px;
        margin: 8vh auto;
        padding: 24px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
      }

      button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
      }

      .error {
        display: none;
        margin-top: 14px;
        color: var(--danger);
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .metric {
        padding: 16px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 14px;
        text-align: left;
      }

      th {
        background: #f8fafc;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section id="loginView" class="login-panel panel">
      <div class="brand">
        <strong>PocketPod Admin</strong>
        <span>Serverpod Auth required</span>
      </div>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="manual-check@example.com" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" value="change-me-now" autocomplete="current-password" required>

        <div style="margin-top: 18px;">
          <button type="submit">Sign in</button>
        </div>
        <div id="loginError" class="error"></div>
      </form>
    </section>

    <section id="adminView" class="shell hidden">
      <aside>
        <div class="brand">
          <strong>PocketPod</strong>
          <span id="scopeLine">Admin workspace</span>
        </div>
        <div class="nav-label">Collections</div>
        <div class="nav-item active">Dashboard <span>3</span></div>
        <div class="nav-item">Products <span>0</span></div>
        <div class="nav-item">Posts <span>0</span></div>
        <div class="nav-label">System</div>
        <div class="nav-item">Auth <span>on</span></div>
      </aside>
      <main>
        <div class="topbar">
          <div>
            <h1>PocketPod Admin</h1>
            <div id="statusLine" class="muted">Checking session...</div>
          </div>
          <button id="logoutButton" class="secondary" type="button">Sign out</button>
        </div>

        <div class="grid">
          <div class="panel metric">
            <span class="muted">Auth</span>
            <strong>Serverpod</strong>
          </div>
          <div class="panel metric">
            <span class="muted">Required Scope</span>
            <strong>admin</strong>
          </div>
          <div class="panel metric">
            <span class="muted">Collections</span>
            <strong id="collectionCount">0</strong>
          </div>
        </div>

        <div class="panel">
          <table>
            <thead>
              <tr>
                <th>Collection</th>
                <th>Generated Control Coverage</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="collectionsBody"></tbody>
          </table>
        </div>
      </main>
    </section>

    <script>
      const apiBase = `${location.protocol}//${location.hostname}:8080`;
      const loginView = document.getElementById('loginView');
      const adminView = document.getElementById('adminView');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const logoutButton = document.getElementById('logoutButton');
      const statusLine = document.getElementById('statusLine');
      const scopeLine = document.getElementById('scopeLine');
      const collectionCount = document.getElementById('collectionCount');
      const collectionsBody = document.getElementById('collectionsBody');

      let authToken = localStorage.getItem('pocketpod.admin.token');

      async function callEndpoint(endpoint, method, body, token) {
        const headers = {'content-type': 'application/json'};
        if (token) {
          headers.authorization = `Bearer ${token}`;
        }

        const response = await fetch(`${apiBase}/${endpoint}/${method}`, {
          method: 'POST',
          headers,
          body: JSON.stringify(body || {}),
        });

        const text = await response.text();
        const payload = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(payload?.message || text || `HTTP ${response.status}`);
        }
        return payload;
      }

      async function loadDashboard() {
        const dashboard = await callEndpoint('admin', 'dashboard', {}, authToken);

        loginView.classList.add('hidden');
        adminView.classList.remove('hidden');
        statusLine.textContent = `${dashboard.message} User: ${dashboard.signedInUserId}`;
        scopeLine.textContent = dashboard.scopeNames.join(', ');
        collectionCount.textContent = dashboard.generatedCollections.length;
        collectionsBody.innerHTML = dashboard.generatedCollections.map((name) => `
          <tr>
            <td>${name}</td>
            <td>text, textarea, checkbox, datetime, dropdown</td>
            <td>Generated</td>
          </tr>
        `).join('');
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        loginError.style.display = 'none';

        try {
          const auth = await callEndpoint('adminAuth', 'login', {
            email: loginForm.email.value,
            password: loginForm.password.value,
          });
          authToken = auth.token;
          localStorage.setItem('pocketpod.admin.token', authToken);
          await loadDashboard();
        } catch (error) {
          loginError.textContent = `Sign in failed: ${error.message}`;
          loginError.style.display = 'block';
        }
      });

      logoutButton.addEventListener('click', () => {
        localStorage.removeItem('pocketpod.admin.token');
        authToken = null;
        adminView.classList.add('hidden');
        loginView.classList.remove('hidden');
      });

      if (authToken) {
        loadDashboard().catch(() => {
          localStorage.removeItem('pocketpod.admin.token');
          authToken = null;
        });
      }
    </script>
  </body>
</html>
