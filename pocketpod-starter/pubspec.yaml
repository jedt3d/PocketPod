name: _
publish_to: none

environment:
  sdk: '^3.10.3'

workspace:
  - pocketpod_client
  - pocketpod_server
  - pocketpod_flutter

dependencies:
  args: ^2.7.0
  http: ^1.6.0
  path: ^1.9.1
  pocketpod_client:
    path: pocketpod_client
  pocketpod_server:
    path: pocketpod_server
  serverpod: 3.5.0-beta.10
  serverpod_auth_idp_server: 3.5.0-beta.10
  sqlite_async: ^0.14.3
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.25.5

dependency_overrides:
  serverpod:
    path: ../serverpod-pocketpod/packages/serverpod
  serverpod_auth_core_server:
    path: ../serverpod-pocketpod/modules/serverpod_auth/serverpod_auth_core/serverpod_auth_core_server
  serverpod_auth_core_client:
    path: ../serverpod-pocketpod/modules/serverpod_auth/serverpod_auth_core/serverpod_auth_core_client
  serverpod_auth_idp_server:
    path: ../serverpod-pocketpod/modules/serverpod_auth/serverpod_auth_idp/serverpod_auth_idp_server
  serverpod_auth_idp_client:
    path: ../serverpod-pocketpod/modules/serverpod_auth/serverpod_auth_idp/serverpod_auth_idp_client
  serverpod_client:
    path: ../serverpod-pocketpod/packages/serverpod_client
  serverpod_database:
    path: ../serverpod-pocketpod/packages/serverpod_database
  serverpod_flutter:
    path: ../serverpod-pocketpod/packages/serverpod_flutter
  serverpod_lints:
    path: ../serverpod-pocketpod/packages/serverpod_lints
  serverpod_serialization:
    path: ../serverpod-pocketpod/packages/serverpod_serialization
  serverpod_shared:
    path: ../serverpod-pocketpod/packages/serverpod_shared
  serverpod_test:
    path: ../serverpod-pocketpod/packages/serverpod_test
