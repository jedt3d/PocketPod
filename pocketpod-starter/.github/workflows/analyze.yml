name: Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: PocketPod

      - uses: actions/checkout@v4
        with:
          repository: serverpod/serverpod
          path: ServerPod

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Install dependencies
        working-directory: PocketPod
        run: flutter pub get

      - name: Analyze
        working-directory: PocketPod
        run: flutter analyze
